<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Gestão de Categorias</title>
  <link rel="stylesheet" href="css/global.css">
</head>
<body>

  <!-- 🔓 CRUD (só aparece depois do login) -->
  <div class="crud-categorias" id="crudScreen" style="display:none;">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    
      <div style="display:flex; gap:10px;">
          <button onclick="window.location.href='financeiro.html'">← Financeiro</button>
          <button onclick="window.location.href='entidades.html'">Entidades</button>
      </div>

      <!-- 🔥 Logout correto -->
      <button id="btnLogout" class="btn-delete">Sair</button>
    </div>

    <div class="barra-entidades">
      <h1>Gestão de Categorias</h1>
    </div>

    <button class="btn-add" onclick="abrirModalCategoria()">+ Adicionar Categoria</button>

    <input 
      type="text" 
      id="pesquisaCategorias" 
      placeholder="Pesquisar categorias..." 
      oninput="filtrarCategorias()" 
      style="margin-bottom: 15px; padding: 8px; width: 300px;"
    >

    <table id="tabelaCategorias">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="modal" id="modalCategoria">
      <div class="modal-content">
        <h3 id="tituloModalCategoria">Adicionar Categoria</h3>

        <label>Nome da Categoria</label>
        <input type="text" id="inputNomeCategoria">

        <button class="btn-add" onclick="guardarCategoria()">Guardar</button>
        <button class="btn-delete" onclick="fecharModalCategoria()">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- 🔥 Firebase compat v9 -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

  <!-- Configuração Firebase -->
  <script src="js/firebase-config.js"></script>

  <!-- 🔐 Proteção da página -->
  <script>
    firebase.auth().onAuthStateChanged(user => {
        if (!user) {
            window.location.href = "login.html";
            return;
        }

        document.getElementById("crudScreen").style.display = "block";
        carregarCategorias();
    });
  </script>

  <!-- 🔓 Logout -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        const btnLogout = document.getElementById("btnLogout");
        if (btnLogout) {
            btnLogout.addEventListener("click", () => {
                firebase.auth().signOut().then(() => {
                    window.location.href = "login.html";
                });
            });
        }
    });
  </script>

  <!-- CRUD -->
  <script src="js/crud-categorias.js"></script>

</body>
</html>
