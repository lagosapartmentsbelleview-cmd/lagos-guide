<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Operacional — Belleview</title>
    <link rel="stylesheet" href="css/operacional.css">
</head>

<body>

    <h1 class="titulo">Painel Operacional</h1>

    <!-- FILTROS -->
    <div id="filtros" class="filtros-container">

        <input type="text" id="filtroTexto" placeholder="Pesquisar texto...">

        <select id="filtroOrigem">
            <option value="">Origem</option>
            <option value="Booking">Booking</option>
            <option value="Airbnb">Airbnb</option>
            <option value="Direto">Direto</option>
        </select>

        <select id="filtroPagamento">
            <option value="">Pagamento</option>
            <option value="total">Pago totalmente</option>
            <option value="parcial">Pago parcialmente</option>
            <option value="nao">Por pagar</option>
        </select>

        <input type="date" id="filtroDataInicio">
        <input type="date" id="filtroDataFim">

        <button id="btnLimparFiltros">Limpar</button>
    </div>

    <!-- TABELA -->
    <div class="tabela-wrapper">
        <table id="tabelaOperacional">
           <thead>
    <tr>
        <th data-col="origem">Origem</th>
        <th data-col="bookingId">Nº Reserva</th>
        <th data-col="cliente">Hóspede</th>
        <th data-col="quartos">Quartos</th>
        <th data-col="apartamentos">Apartamentos</th>
        <th data-col="hospedes">Pessoas</th>
        <th data-col="checkin">Check-in</th>
        <th data-col="checkout">Check-out</th>
        <th data-col="noites">Noites</th>
        <th data-col="totalBruto">Total Bruto (€)</th>
        <th data-col="valorNoite">Valor/Noite (€)</th>
        <th data-col="antesIVA">Bruto S/IVA (€)</th>
        <th data-col="valorIVA">IVA (€)</th>
        <th data-col="comissao">Comissão (€)</th>
        <th data-col="comissaoExtra">Comissão Extra (€)</th>
        <th data-col="limpeza">Limpeza (€)</th>
        <th data-col="liquidoOTA">Liq. OTA (€)</th>
        <th data-col="liquidoOperacional">Liq. Operacional (€)</th>
        <th data-col="liquidoTotal">Liq. Total (€)</th>
        <th data-col="numeroFatura">Nº Fatura</th>
        <th data-col="estadoPagamentoOperacional">Pagamento</th>
        <th>Ações</th>
    </tr>
</thead>

            <tbody id="tbodyOperacional"></tbody>
        </table>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/operacional.js"></script>


</body>
</html>
