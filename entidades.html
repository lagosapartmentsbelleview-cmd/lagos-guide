<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Entidades</title>
    <link rel="stylesheet" href="css/global.css">
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginScreen" style="display:flex; flex-direction:column; gap:10px; padding:20px;">
    <h2>Autenticação Necessária</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Entrar</button>
</div>

<!-- 🔓 CRUD (só aparece depois do login) -->
<div class="crud-entidades" id="crudScreen" style="display:none;">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <div style="display:flex; gap:10px;">
            <button onclick="window.location.href='financeiro.html'">← Financeiro</button>
            <button onclick="window.location.href='categorias.html'">Categorias</button>
        </div>

        <!-- 🔥 Logout correto -->
        <button id="btnLogout" class="btn-delete">Sair</button>
    </div>

    <div class="barra-entidades">
        <h1>Gestão de Entidades</h1>
    </div>

    <button class="btn-add" onclick="abrirModalAdicionar()">+ Adicionar Entidade</button>

    <input 
        type="text" 
        id="pesquisaEntidades" 
        placeholder="Pesquisar por NIF ou Nome..." 
        oninput="filtrarEntidades()" 
        style="margin-bottom: 15px; padding: 8px; width: 300px;"
    >

    <button onclick="exportarExcel()">Exportar Excel</button>

    <table id="tabelaEntidades">
        <thead>
            <tr>
                <th onclick="ordenarEntidades('nif')">NIF ▲▼</th>
                <th onclick="ordenarEntidades('nome')">Entidade ▲▼</th>
                <th onclick="ordenarEntidades('categoria')">Categoria ▲▼</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- Modal -->
    <div class="modal" id="modalEntidade">
        <div class="modal-content">
            <h3 id="tituloModal">Adicionar Entidade</h3>

            <label>NIF</label>
            <input type="text" id="inputNIF">

            <label>Nome da Entidade</label>
            <input type="text" id="inputEntidade">

            <label>Categoria</label>
            <select id="inputCategoria">
                <option value="Água">Água</option>
                <option value="Energia">Energia</option>
                <option value="Telecomunicações">Telecomunicações</option>
                <option value="Combustível">Combustível</option>
                <option value="Alimentação">Alimentação</option>
                <option value="Bricolage">Bricolage</option>
                <option value="Construção">Construção</option>
                <option value="Decoração">Decoração</option>
                <option value="Equipamentos">Equipamentos</option>
                <option value="Serviços">Serviços</option>
                <option value="Outros">Outros</option>
            </select>

            <button onclick="guardarEntidade()">Guardar</button>
            <button class="btn-delete" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

</div>

<!-- 🔥 Firebase compat v9 -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<!-- 🔥 Configuração Firebase -->
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyD70hv-PgWJKDbK-tcxeRuB1FE1cVs-FBs",
    authDomain: "reservas-marina-park.firebaseapp.com",
    projectId: "reservas-marina-park",
    storageBucket: "reservas-marina-park.appspot.com",
    messagingSenderId: "1048056704068",
    appId: "1:1048056704068:web:a2793d5db5e5e5573c6011",
    measurementId: "G-14GR64WXHS"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.firestore();
</script>

<!-- 🔐 LOGIN + PROTEÇÃO -->
<script>
  function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      firebase.auth().signInWithEmailAndPassword(email, password)
          .then(() => {
              document.getElementById("loginScreen").style.display = "none";
              document.getElementById("crudScreen").style.display = "block";
              atualizarTabela();
          })
          .catch(err => alert("Erro no login: " + err.message));
  }

  firebase.auth().onAuthStateChanged(user => {
      if (user) {
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("crudScreen").style.display = "block";
          atualizarTabela();
      }
  });
</script>

<!-- 🔓 LOGOUT -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    const btnLogout = document.getElementById("btnLogout");
    if (btnLogout) {
        btnLogout.addEventListener("click", () => {
            firebase.auth().signOut().then(() => {
                window.location.href = "login.html";
            });
        });
    }
});
</script>

<!-- CRUD -->
<script src="js/crud-entidades.js"></script>

</body>
</html>
